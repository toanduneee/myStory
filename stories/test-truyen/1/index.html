<!DOCTYPE html>
<html lang="vi" class="dark"> <!-- Bỏ class "dark" nếu muốn mặc định là nền sáng -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 1 - Kho Truyện</title>
    <!-- Nhúng Tailwind CSS trực tiếp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        // Có thể thay bằng font arcade-among-2 nếu bạn muốn style retro
                        sans: ['ui-sans-serif', 'system-ui', 'sans-serif'], 
                        serif: ['ui-serif', 'Georgia', 'Cambria', 'Times New Roman', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Tùy chỉnh CSS thêm nếu cần, thay thế cho style.css cũ */
        .story-content p {
            margin-bottom: 1.5rem;
            text-indent: 1.5rem; /* Thụt lề đầu dòng chuẩn form đọc truyện */
        }
    </style>
</head>
<body class="bg-[#f4f1ea] dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300 font-serif">

    <!-- Thanh Navigation -->
    <nav class="max-w-3xl mx-auto py-4 px-6 mb-8 flex justify-between items-center border-b border-gray-300 dark:border-gray-700">
        <a href="/" class="text-blue-600 dark:text-blue-400 hover:underline font-sans font-semibold">
            &larr; Về trang chủ
        </a>
        <h1 class="text-lg font-bold font-sans">Tên Truyện Của Bạn</h1>
    </nav>

    <!-- Khu vực hiển thị truyện -->
    <main class="max-w-3xl mx-auto px-6 pb-20">
        <h2 class="text-3xl font-bold mb-10 text-center">Chương 1: Sự khởi đầu</h2>
        
        <!-- Nội dung file .txt sẽ được JavaScript ném vào đây -->
        <div id="truyen-container" class="story-content text-lg leading-loose text-justify">
            <p class="text-center text-gray-500 italic">Đang tải nội dung truyện...</p>
        </div>
    </main>

    <!-- Cơ chế đọc file .txt bằng JavaScript -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Đường dẫn tới file txt (nằm cùng thư mục với file html này)
            const filePath = 'noidung.txt'; 
            
            fetch(filePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Không thể tải file truyện!');
                    }
                    return response.text();
                })
                .then(text => {
                    // Xử lý xuống dòng: biến các dấu enter trong file txt thành thẻ <p>
                    const paragraphs = text.split('\n').filter(p => p.trim() !== '');
                    const htmlContent = paragraphs.map(p => `<p>${p}</p>`).join('');
                    
                    // Hiển thị ra màn hình
                    document.getElementById('truyen-container').innerHTML = htmlContent;
                })
                .catch(error => {
                    document.getElementById('truyen-container').innerHTML = 
                        `<p class="text-red-500 text-center">Lỗi: ${error.message}</p>`;
                });
        });
    </script>
</body>
</html>
